name: Continuous Integration

on:
  push:
    branches:
      - main
      - jenk
  workflow_dispatch:

jobs:
  my_first_job:
    runs-on: ubuntu-latest

    steps:
    - name: Clone the project
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Припустимо, що ваш проект використовує Maven (шукає файл pom.xml)
    - name: Build and Test with Maven
      run: |
        if [ -f pom.xml ]; then
          mvn clean test
        else
          echo "pom.xml not found, compiling manually..."
          javac $(find . -name "*.java")
        fi